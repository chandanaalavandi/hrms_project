<!DOCTYPE html>
<html>
<head>
    <title>HRMS - Mark Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/employees">Employees</a></li>
            <li><a href="/report">Department Report</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <h1>Mark Attendance for {{ employee.name }}</h1>
        
        <div class="add-employee-form">
            <form id="attendanceForm" onsubmit="markAttendance(event, {{ employee.id }})">
                <div class="form-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" required value="{{ today }}">
                </div>
                
                <div class="form-group">
                    <label for="in_time">In Time:</label>
                    <input type="time" id="in_time" name="in_time" required value="09:00">
                </div>
                
                <div class="form-group">
                    <label for="out_time">Out Time (optional):</label>
                    <input type="time" id="out_time" name="out_time" value="18:00">
                </div>
                
                <button type="submit" class="btn">Mark Attendance</button>
                <a href="/employee/{{ employee.id }}" class="btn">Cancel</a>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>
    </div>

    <script>
        async function markAttendance(event, employeeId) {
            event.preventDefault();
            
            const formData = {
                employee_id: employeeId,
                date: document.getElementById('date').value,
                in_time: document.getElementById('in_time').value + ':00',
                out_time: document.getElementById('out_time').value ? 
                         document.getElementById('out_time').value + ':00' : null
            };
            
            try {
                const response = await fetch('/api/attendance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('formMessage').innerHTML = 
                        '<div class="success">Attendance marked successfully! Redirecting...</div>';
                    
                    setTimeout(() => {
                        window.location.href = `/employee/${employeeId}`;
                    }, 2000);
                } else {
                    document.getElementById('formMessage').innerHTML = 
                        `<div class="error">Error: ${result.error}</div>`;
                }
            } catch (error) {
                document.getElementById('formMessage').innerHTML = 
                    '<div class="error">Error marking attendance. Please try again.</div>';
            }
        }
    </script>
</body>
</html>
