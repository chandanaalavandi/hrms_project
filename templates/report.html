<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS - Reports</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- ... sidebar content ... -->
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1>Department Reports</h1>
                <p class="subtitle">Department-wise employee count with charts, table view, and export options.</p>
            </div>

            <!-- Summary Cards -->
            <div class="stats-grid small" id="reportStats">
                <!-- Populated by JavaScript -->
            </div>

            <!-- Report Controls -->
            <div class="report-controls">
                <div class="view-toggle">
                    <button class="toggle-btn active" onclick="showChart('bar')">
                        <i class="fas fa-chart-bar"></i> Bar Chart
                    </button>
                    <button class="toggle-btn" onclick="showChart('doughnut')">
                        <i class="fas fa-chart-pie"></i> Doughnut
                    </button>
                </div>
                <div class="export-actions">
                    <button onclick="exportJSON()" class="btn-secondary">
                        <i class="fas fa-code"></i> JSON
                    </button>
                    <a href="/api/report/export/csv" class="btn-secondary">
                        <i class="fas fa-file-csv"></i> Export CSV
                    </a>
                </div>
            </div>

            <!-- Charts Container -->
            <div class="charts-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>Department Count</h3>
                    </div>
                    <div class="card-body">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3>Distribution</h3>
                    </div>
                    <div class="card-body">
                        <canvas id="doughnutChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="card">
                <div class="card-header">
                    <h3>Detailed View</h3>
                </div>
                <div class="card-body">
                    <table class="modern-table" id="reportTable">
                        <thead>
                            <tr>
                                <th>Department</th>
                                <th>Employee Count</th>
                                <th>Percentage</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- API Documentation -->
            <div class="card">
                <div class="card-header">
                    <h3>API Endpoint</h3>
                    <span class="badge">GET /api/report/department/</span>
                </div>
                <div class="card-body">
                    <div class="api-demo">
                        <div class="api-response">
                            <pre><code id="apiResponse">{
    "Engineering": 2
}</code></pre>
                        </div>
                        <div class="api-methods">
                            <span class="method-badge get">GET</span>
                            <span class="method-badge options">OPTIONS</span>
                            <span class="method-badge head">HEAD</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let barChart, doughnutChart;
        let currentData = [];
        
        async function loadReportData() {
            try {
                const response = await fetch('/api/report/department/');
                const data = await response.json();
                
                // Convert object to array
                currentData = Object.entries(data).map(([dept, count]) => ({
                    department: dept,
                    count: count
                }));
                
                updateStats();
                updateCharts();
                updateTable();
                updateAPIResponse(data);
            } catch (error) {
                console.error('Error loading report data:', error);
            }
        }
        
        function updateStats() {
            const totalEmployees = currentData.reduce((sum, item) => sum + item.count, 0);
            const totalDepartments = currentData.length;
            
            document.getElementById('reportStats').innerHTML = `
                <div class="stat-card mini">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <div class="stat-content">
                        <h4>Departments</h4>
                        <div class="stat-number">${totalDepartments}</div>
                    </div>
                </div>
                <div class="stat-card mini">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-content">
                        <h4>Total Employees</h4>
                        <div class="stat-number">${totalEmployees}</div>
                    </div>
                </div>
            `;
        }
        
        function updateCharts() {
            const labels = currentData.map(item => item.department);
            const counts = currentData.map(item => item.count);
            
            // Destroy existing charts
            if (barChart) barChart.destroy();
            if (doughnutChart) doughnutChart.destroy();
            
            // Create Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Number of Employees',
                        data: counts,
                        backgroundColor: 'rgba(54, 162, 235, 0.8)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            stepSize: 1
                        }
                    }
                }
            });
            
            // Create Doughnut Chart
            const doughnutCtx = document.getElementById('doughnutChart').getContext('2d');
            doughnutChart = new Chart(doughnutCtx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            'rgba(54, 162, 235, 0.8)',
                            'rgba(255, 99, 132, 0.8)',
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(153, 102, 255, 0.8)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        function updateTable() {
            const total = currentData.reduce((sum, item) => sum + item.count, 0);
            
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = currentData.map(item => {
                const percentage = ((item.count / total) * 100).toFixed(1);
                return `
                    <tr>
                        <td><strong>${item.department}</strong></td>
                        <td>${item.count}</td>
                        <td>
                            <div class="percentage-bar">
                                <div class="percentage-fill" style="width: ${percentage}%"></div>
                                <span>${percentage}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function updateAPIResponse(data) {
            document.getElementById('apiResponse').textContent = JSON.stringify(data, null, 4);
        }
        
        function showChart(type) {
            // Toggle active class
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Show/hide charts (implement based on your needs)
        }
        
        function exportJSON() {
            const dataStr = JSON.stringify(Object.fromEntries(
                currentData.map(item => [item.department, item.count])
            ), null, 2);
            
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'department_report.json';
            a.click();
        }
        
        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadReportData);
    </script>
</body>
</html>
